name: Deploy fabrica-copa

on:
  push:
    # branches:
    #   - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy para Produção na VPS da BRDrive
    runs-on: self-hosted

    steps:
      # ── 1. PREPARAÇÃO ───────────────────────────────────────────────────────
      - name: 📂 Checkout do Código
        uses: actions/checkout@v4

      - name: 🏷️ Definir versão do build
        run: |
          echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "IMAGE_NAME=album-figurinhas-copa:${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Gerar backend/.env e frontend/.env a partir do GitHub
        env:
          BACKEND_ENV_FILE_SECRET: ${{ secrets.BACKEND_ENV_FILE }}
          BACKEND_ENV_FILE_VAR: ${{ vars.BACKEND_ENV_FILE }}
          FRONTEND_ENV_FILE_SECRET: ${{ secrets.FRONTEND_ENV_FILE }}
          FRONTEND_ENV_FILE_VAR: ${{ vars.FRONTEND_ENV_FILE }}
        run: |
          echo "Gerando backend/.env e frontend/.env para o deploy..."

          BACKEND_ENV_CONTENT="$BACKEND_ENV_FILE_SECRET"
          if [ -z "$BACKEND_ENV_CONTENT" ]; then
            BACKEND_ENV_CONTENT="$BACKEND_ENV_FILE_VAR"
          fi

          FRONTEND_ENV_CONTENT="$FRONTEND_ENV_FILE_SECRET"
          if [ -z "$FRONTEND_ENV_CONTENT" ]; then
            FRONTEND_ENV_CONTENT="$FRONTEND_ENV_FILE_VAR"
          fi

          if [ -z "$BACKEND_ENV_CONTENT" ]; then
            echo "ERRO: BACKEND_ENV_FILE não definido em secrets ou vars do repositório."
            exit 1
          fi

          if [ -z "$FRONTEND_ENV_CONTENT" ]; then
            echo "ERRO: FRONTEND_ENV_FILE não definido em secrets ou vars do repositório."
            exit 1
          fi

          mkdir -p backend frontend
          printf '%s' "$BACKEND_ENV_CONTENT" > backend/.env
          printf '%s' "$FRONTEND_ENV_CONTENT" > frontend/.env

          echo "Arquivos backend/.env e frontend/.env criados com sucesso para o deploy."

      - name: Validar Ambiente e Arquivos
        run: |
          echo "Verificando arquivos críticos..."
          test -f docker-compose.yml || (echo "ERRO: docker-compose.yml não encontrado" && exit 1)
          test -f backend/.env || (echo "ERRO: backend/.env não encontrado" && exit 1)
          test -f frontend/.env || (echo "ERRO: frontend/.env não encontrado" && exit 1)

          echo "Garantindo rede externa de produção..."
          docker network inspect fabrica-network >/dev/null 2>&1 || docker network create fabrica-network

          echo "Validando sintaxe do Docker Compose de Produção..."
          docker compose -f docker-compose.yml --profile prod config -q

      - name: ✅ Testes de Qualidade
        run: |
          echo "Executando validações de qualidade (se scripts existirem)..."
          npm --prefix backend run --if-present test
          npm --prefix frontend run --if-present test
          npm --prefix frontend run build
          echo "✅ Validações concluídas."

      # ── 2. EXECUÇÃO ─────────────────────────────────────────────────────────
      - name: Atualizar e Subir Containers
        run: |
          echo "Gatilho: ${{ github.ref_name }}"
          echo "Versão: $IMAGE_TAG"
          echo "Imagem: $IMAGE_NAME"
          echo "Commit: $GIT_COMMIT"

          echo "Puxando imagens novas (se houver)..."
          docker compose -f docker-compose.yml --profile prod pull --quiet || true

          echo "Iniciando serviços de produção..."
          # Usando o arquivo de produção para subir o stack
          docker compose -f docker-compose.yml --profile prod up -d --build --remove-orphans --wait

      # ── 3. MANUTENÇÃO (PÓS-DEPLOY) ──────────────────────────────────────────
      - name: Status Final
        run: |
          echo "--- Containers Ativos ---"
          docker compose -f docker-compose.yml --profile prod ps

          echo "--- Consumo de Recursos ---"
          docker stats --no-stream album-backend-prod album-frontend-prod || true

      - name: Limpar arquivos .env temporários
        if: always()
        run: rm -f backend/.env frontend/.env .env
