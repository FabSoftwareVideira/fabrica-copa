services:
  # ----------------------------------------------------------
  # DESENVOLVIMENTO
  # ----------------------------------------------------------
  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-dev
    container_name: album-backend-dev
    profiles: [dev]
    working_dir: /app/backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3001
      TRUST_PROXY: "true"
      DB_PATH: /app/data/album.db
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./backend:/app/backend
      - ./frontend/js/data.js:/app/frontend/js/data.js:ro
      - ./data:/app/data
      - /app/backend/node_modules
    command: npm run dev -- --legacy-watch
    init: true
    ports:
      - "3001:3001"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >
          fetch("http://127.0.0.1:3001/api/health")
            .then(r => process.exit(r.ok ? 0 : 1))
            .catch(() => process.exit(1))
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    restart: unless-stopped
    networks:
      - album-network

  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-dev
    container_name: album-frontend-dev
    profiles: [dev]
    working_dir: /app/frontend
    depends_on:
      backend-dev:
        condition: service_healthy
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:3001/api
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "250"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    init: true
    ports:
      - "5173:5173"
    restart: unless-stopped
    networks:
      - album-network

  # ----------------------------------------------------------
  # PRODUÇÃO
  # ----------------------------------------------------------
  backend-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-prod
    container_name: album-backend-prod
    profiles: [prod]
    working_dir: /app/backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      TRUST_PROXY: "true"
      DB_PATH: /app/data/album.db
      BACKUP_DIR: /backups
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./scripts:/app/scripts:ro
      - ./backups:/backups
      - album-data:/app/data
    command: npm start
    init: true
    ports:
      - "3001:3001"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >
          fetch("http://127.0.0.1:3001/api/health")
            .then(r => process.exit(r.ok ? 0 : 1))
            .catch(() => process.exit(1))
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 4
    restart: unless-stopped
    networks:
      - fabrica-network

  frontend-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-prod
      args:
        # Opcional. Se vazio, o frontend usa fallback dinamico por hostname.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/copa/}
    container_name: album-frontend-prod
    profiles: [prod]
    depends_on:
      backend-prod:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped
    networks:
      - fabrica-network

networks:
  album-network:
    driver: bridge
  fabrica-network:
    external: true

volumes:
  album-data:
