services:
  # ----------------------------------------------------------
  # DESENVOLVIMENTO
  # ----------------------------------------------------------
  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-dev
    container_name: album-backend-dev
    profiles: [dev]
    working_dir: /app/backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3001
      TRUST_PROXY: "true"
      DB_PATH: /app/data/album.db
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./backend:/app/backend
      - ./frontend/js/data.js:/app/frontend/js/data.js:ro
      - ./data:/app/data
      - /app/backend/node_modules
    command: sh -c "npm ci && npm run dev -- --legacy-watch"
    init: true
    ports:
      - "3001:3001"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >
          fetch("http://127.0.0.1:3001/api/health")
            .then(r => process.exit(r.ok ? 0 : 1))
            .catch(() => process.exit(1))
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    restart: unless-stopped
    networks:
      - album-network

  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-dev
    container_name: album-frontend-dev
    profiles: [dev]
    working_dir: /app/frontend
    depends_on:
      backend-dev:
        condition: service_healthy
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:3001/api
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "250"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    init: true
    ports:
      - "5173:5173"
    restart: unless-stopped
    networks:
      - album-network

  # ----------------------------------------------------------
  # PRODUÇÃO
  # ----------------------------------------------------------
  backend-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-prod
    container_name: album-backend-prod
    profiles: [prod]
    working_dir: /app/backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      TRUST_PROXY: "true"
      DB_PATH: /app/data/album.db
      BACKUP_DIR: /backups
      LOG_ROTATION_ENABLED: "true"
      LOG_DIR: /app/logs
      LOG_ROTATION_INTERVAL: ${LOG_ROTATION_INTERVAL:-1d}
      LOG_ROTATION_MAX_FILES: ${LOG_ROTATION_MAX_FILES:-14}
    volumes:
      - ./scripts:/app/scripts:ro
      - ${HOST_DB_DIR:-/srv/fabrica-copa-data}:/app/data
      - ${HOST_UPLOAD_DIR:-/srv/fabrica-copa-data/uploads}:/app/backend/uploads
      - ${HOST_BACKUP_DIR:-/srv/fabrica-copa-backups}:/backups
      - ${HOST_LOG_DIR:-/srv/fabrica-copa-logs}:/app/logs
    command: npm start
    init: true
    ports:
      - "3001:3001"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >
          fetch("http://127.0.0.1:3001/api/health")
            .then(r => process.exit(r.ok ? 0 : 1))
            .catch(() => process.exit(1))
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 4
    restart: always
    mem_limit: 512m
    cpus: 1.0
    networks:
      - fabrica-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  frontend-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-prod
      args:
        # Opcional. Se vazio, o frontend usa fallback dinamico por hostname.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: album-frontend-prod
    profiles: [prod]
    depends_on:
      backend-prod:
        condition: service_healthy
    ports:
      - "5173:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1/healthz || exit 1
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 4
    restart: always
    mem_limit: 128m
    cpus: 0.5
    networks:
      - fabrica-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.10"
          memory: 32M

  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: album-fail2ban
    profiles: [prod]
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      TZ: ${F2B_TZ:-UTC}
      F2B_LOG_LEVEL: ${F2B_LOG_LEVEL:-INFO}
      F2B_DB_PURGE_AGE: ${F2B_DB_PURGE_AGE:-7d}
    volumes:
      - ${HOST_LOG_DIR:-/srv/fabrica-copa-logs}:/data
      - ./security/fail2ban:/seed/fail2ban:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command:
      - sh
      - -ec
      - |
        mkdir -p /data /data/filter.d /data/jail.d /data/db
        rm -f /var/run/fail2ban/fail2ban.sock /var/run/fail2ban/fail2ban.pid
        if ls /seed/fail2ban/filter.d/*.conf >/dev/null 2>&1; then
          cp -n /seed/fail2ban/filter.d/*.conf /data/filter.d/
        fi
        if ls /seed/fail2ban/jail.d/*.conf >/dev/null 2>&1; then
          cp -n /seed/fail2ban/jail.d/*.conf /data/jail.d/
        fi
        exec /entrypoint.sh fail2ban-server
    healthcheck:
      test:
        - CMD-SHELL
        - pgrep -f 'fail2ban-server' >/dev/null 2>&1
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 8
    restart: always

networks:
  album-network:
    driver: bridge
  fabrica-network:
    external: true
